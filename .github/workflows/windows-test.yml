name: Windows Test Build

on:
  workflow_dispatch:
  push:
    branches:
      - windows
    paths:
      - .github/workflows/windows-test.yml
      - package.json
      - bun.lock
      - scripts/**
      - src/**

permissions:
  contents: read

concurrency:
  group: windows-test-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build Windows artifact
        run: bun scripts/build-release-artifacts.ts --platform windows --arch x64

      - name: Smoke test packaged Windows app startup
        shell: pwsh
        env:
          GOBLIN_SMOKE_USER_DATA: ${{ runner.temp }}\hobgoblin-smoke-user-data
        run: |
          $ErrorActionPreference = "Stop"

          function Get-SmokeServerUrl {
            param([Parameter(Mandatory = $true)][string]$LogPath)

            $log = Get-Content $LogPath -Raw
            $match = [regex]::Match($log, '\[embedded-server-ready\]\s+\{.*?"url":"(?<url>http://[^"]+)"')
            if (-not $match.Success) {
              throw "Could not find embedded server URL in startup log"
            }
            return $match.Groups["url"].Value
          }

          function Get-SmokeBootstrap {
            param([Parameter(Mandatory = $true)][string]$ServerUrl)

            $rootUrl = "$($ServerUrl.TrimEnd('/'))/"
            $html = (Invoke-WebRequest -Uri $rootUrl -TimeoutSec 10).Content
            $match = [regex]::Match(
              $html,
              '<script id="goblin-bootstrap" type="application/json">(?<json>.*?)</script>',
              [System.Text.RegularExpressions.RegexOptions]::Singleline
            )
            if (-not $match.Success) {
              throw "Could not find renderer bootstrap in server HTML"
            }
            return $match.Groups["json"].Value | ConvertFrom-Json
          }

          function ConvertTo-TerminalWebSocketUrl {
            param(
              [Parameter(Mandatory = $true)][string]$ServerUrl,
              [Parameter(Mandatory = $true)][string]$Secret,
              [Parameter(Mandatory = $true)][string]$ClientId,
              [Parameter(Mandatory = $true)][string]$AttachmentId
            )

            $builder = [System.UriBuilder]::new($ServerUrl)
            if ($builder.Scheme -eq "https") {
              $builder.Scheme = "wss"
            } else {
              $builder.Scheme = "ws"
            }
            $builder.Path = "/ws/terminal"
            $builder.Query = "token=$([System.Uri]::EscapeDataString($Secret))&clientId=$([System.Uri]::EscapeDataString($ClientId))&attachmentId=$([System.Uri]::EscapeDataString($AttachmentId))"
            return $builder.Uri.AbsoluteUri
          }

          function Send-WebSocketJson {
            param(
              [Parameter(Mandatory = $true)][System.Net.WebSockets.ClientWebSocket]$Socket,
              [Parameter(Mandatory = $true)][object]$Payload,
              [Parameter(Mandatory = $true)][System.Threading.CancellationToken]$Token
            )

            $json = $Payload | ConvertTo-Json -Depth 8 -Compress
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($json)
            $segment = [System.ArraySegment[byte]]::new($bytes)
            $Socket.SendAsync($segment, [System.Net.WebSockets.WebSocketMessageType]::Text, $true, $Token).GetAwaiter().GetResult()
          }

          function Receive-WebSocketJson {
            param(
              [Parameter(Mandatory = $true)][System.Net.WebSockets.ClientWebSocket]$Socket,
              [Parameter(Mandatory = $true)][System.Threading.CancellationToken]$Token
            )

            $buffer = New-Object byte[] 65536
            $builder = [System.Text.StringBuilder]::new()
            do {
              $segment = [System.ArraySegment[byte]]::new($buffer)
              $result = $Socket.ReceiveAsync($segment, $Token).GetAwaiter().GetResult()
              if ($result.MessageType -eq [System.Net.WebSockets.WebSocketMessageType]::Close) {
                throw "Terminal WebSocket closed before create response"
              }
              [void]$builder.Append([System.Text.Encoding]::UTF8.GetString($buffer, 0, $result.Count))
            } while (-not $result.EndOfMessage)

            return $builder.ToString() | ConvertFrom-Json
          }

          function Invoke-TerminalCreateSmoke {
            param(
              [Parameter(Mandatory = $true)][string]$ServerUrl,
              [Parameter(Mandatory = $true)][string]$WorkspacePath
            )

            $bootstrap = Get-SmokeBootstrap -ServerUrl $ServerUrl
            $server = $bootstrap.initialServer
            if (-not $server -or -not $server.secret -or -not $server.clientId) {
              throw "Renderer bootstrap did not include terminal server credentials"
            }

            New-Item -ItemType Directory -Force -Path $WorkspacePath | Out-Null
            $attachmentId = "attachment_smoke"
            $socketUrl = ConvertTo-TerminalWebSocketUrl -ServerUrl $server.url -Secret $server.secret -ClientId $server.clientId -AttachmentId $attachmentId
            $socket = [System.Net.WebSockets.ClientWebSocket]::new()
            $cts = [System.Threading.CancellationTokenSource]::new()
            $cts.CancelAfter([TimeSpan]::FromSeconds(20))
            try {
              $socket.ConnectAsync([Uri]$socketUrl, $cts.Token).GetAwaiter().GetResult()
              Send-WebSocketJson -Socket $socket -Token $cts.Token -Payload @{
                type = "request"
                requestId = "terminal_smoke_create"
                action = "create"
                input = @{
                  repoRoot = $WorkspacePath
                  branch = "workspace"
                  worktreePath = $WorkspacePath
                  kind = "primary"
                  cols = 80
                  rows = 24
                  attachmentId = $attachmentId
                }
              }

              $createResponse = $null
              while (-not $createResponse) {
                $message = Receive-WebSocketJson -Socket $socket -Token $cts.Token
                if ($message.type -eq "response" -and $message.requestId -eq "terminal_smoke_create") {
                  $createResponse = $message
                }
              }
              if ($createResponse.ok -ne $true) {
                throw "Terminal create WebSocket request failed: $($createResponse.error)"
              }
              if ($createResponse.payload.ok -ne $true) {
                throw "Terminal create returned failure: $($createResponse.payload.message)"
              }

              $sessionId = $createResponse.payload.sessionId
              Send-WebSocketJson -Socket $socket -Token $cts.Token -Payload @{
                type = "request"
                requestId = "terminal_smoke_close"
                action = "close"
                input = @{ sessionId = $sessionId }
              }
              Write-Host "Terminal smoke created session $sessionId"
            } finally {
              try {
                if ($socket.State -eq [System.Net.WebSockets.WebSocketState]::Open) {
                  $socket.CloseAsync(
                    [System.Net.WebSockets.WebSocketCloseStatus]::NormalClosure,
                    "terminal smoke complete",
                    [System.Threading.CancellationToken]::None
                  ).GetAwaiter().GetResult()
                }
              } catch {}
              $socket.Dispose()
              $cts.Dispose()
            }
          }

          $exe = Get-ChildItem -Path "release" -Recurse -Filter "Hobgoblin.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Host "Could not find unpacked Hobgoblin.exe. Release tree:"
            Get-ChildItem -Path "release" -Recurse | Select-Object FullName
            throw "Missing unpacked Hobgoblin.exe for smoke test"
          }

          $userData = $env:GOBLIN_SMOKE_USER_DATA
          New-Item -ItemType Directory -Force -Path $userData | Out-Null
          $env:APPDATA = $userData
          $env:LOCALAPPDATA = $userData
          $env:GOBLIN_USER_DATA_DIR = $userData

          Write-Host "Smoke executable: $($exe.FullName)"
          Write-Host "Smoke user data: $userData"
          $process = Start-Process -FilePath $exe.FullName -PassThru
          $deadline = (Get-Date).AddSeconds(45)
          $ready = $false
          $logPath = $null
          $terminalSmokeError = $null

          while ((Get-Date) -lt $deadline) {
            if ($process.HasExited) {
              break
            }
            $logFile = Get-ChildItem -Path $userData -Recurse -Filter "startup.log" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($logFile) {
              $logPath = $logFile.FullName
              $log = Get-Content $logPath -Raw
              if ($log -match "renderer-load-complete") {
                $ready = $true
                break
              }
              if ($log -match "startup-error-page|renderer-did-fail-load|renderer-process-gone|embedded-server-ready-failed") {
                break
              }
            }
            Start-Sleep -Milliseconds 500
          }

          if ($ready -and $logPath -and (Test-Path $logPath)) {
            try {
              $serverUrl = Get-SmokeServerUrl -LogPath $logPath
              $terminalWorkspace = Join-Path $env:RUNNER_TEMP "hobgoblin-terminal-smoke-workspace"
              Invoke-TerminalCreateSmoke -ServerUrl $serverUrl -WorkspacePath $terminalWorkspace
            } catch {
              $terminalSmokeError = $_
            }
          }

          if (-not $process.HasExited) {
            Stop-Process -Id $process.Id -Force
          }

          if ($process.HasExited) {
            Write-Host "Hobgoblin process exited with code $($process.ExitCode)"
          }

          if ($logPath -and (Test-Path $logPath)) {
            Get-Content $logPath
          } else {
            Write-Host "Startup log was not found under $userData"
            Get-ChildItem -Path $userData -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
          }

          if (-not $ready) {
            throw "Packaged Windows app did not complete renderer startup smoke"
          }
          if ($terminalSmokeError) {
            throw $terminalSmokeError
          }

      - name: Upload Windows startup smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hobgoblin-windows-startup-logs-${{ github.sha }}
          path: ${{ runner.temp }}\hobgoblin-smoke-user-data\**\*
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: hobgoblin-windows-x64-${{ github.sha }}
          path: release/Hobgoblin-*-x64.exe
          if-no-files-found: error
          retention-days: 7
